spring:
  application:
    name: LinkSnap

  datasource:
    url: jdbc:postgresql://localhost:5432/linksnap
    username: postgres
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

security:
    jwt:
      secret-key: mySuperSecretKeyThatIsAtLeast32CharactersLong
      expiration-time: 86400000

